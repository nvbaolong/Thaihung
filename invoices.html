<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quản Lý Hóa Đơn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 font-sans">

    <div class="flex h-screen bg-gray-100">
        <aside class="sidebar bg-white shadow-lg transition-all duration-300">
            <div class="h-16 flex items-center justify-center border-b">
                <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
            </div>
            <nav class="mt-4">
                <ul id="main-tabs" class="flex flex-col p-2 space-y-1">
                    <li><a href="index.html" class="flex items-center p-3 rounded-lg sidebar-item"><i
                                class="fas fa-cash-register w-6 text-center"></i><span class="ml-3">Bán Hàng</span></a>
                    </li>
                    <li><a href="invoices.html" class="flex items-center p-3 rounded-lg sidebar-item sidebar-active"><i
                                class="fas fa-file-invoice-dollar w-6 text-center"></i><span class="ml-3">Hóa
                                Đơn</span></a></li>
                    <li><a href="history.html" class="flex items-center p-3 rounded-lg sidebar-item"><i
                                class="fas fa-history w-6 text-center"></i><span class="ml-3">Lịch Sử & Công
                                Nợ</span></a></li>
                    <li><a href="manage.html" class="flex items-center p-3 rounded-lg sidebar-item"><i
                                class="fas fa-boxes-stacked w-6 text-center"></i><span class="ml-3">Quản Lý Hàng
                                Hóa</span></a></li>
                    <li><a href="customers.html" class="flex items-center p-3 rounded-lg sidebar-item"><i
                                class="fas fa-users w-6 text-center"></i><span class="ml-3">Khách Hàng</span></a></li>
                    <li><a href="purchase.html" class="flex items-center p-3 rounded-lg sidebar-item"><i
                                class="fas fa-dolly w-6 text-center"></i><span class="ml-3">Nhập Hàng</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 flex items-center justify-between px-6 bg-white border-b">
                <h2 id="page-title" class="text-2xl font-semibold text-gray-900">Quản Lý Hóa Đơn</h2>
                <button id="add-invoice-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold">
                    <i class="fas fa-plus mr-2"></i>Tạo Hóa Đơn Mới
                </button>
            </header>

            <div id="main-content" class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-4 sm:p-6 lg:p-8">
                <!-- Filters -->
                <div
                    class="bg-white p-4 rounded-lg shadow-md mb-6 flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                    <div class="flex-1">
                        <input type="text" id="invoice-search" placeholder="Tìm kiếm theo số hóa đơn, người bán..."
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Invoice List Table -->
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 uppercase text-gray-700 font-semibold text-sm">
                                <tr>
                                    <th class="px-6 py-3">Số Hóa Đơn</th>
                                    <th class="px-6 py-3">Người Bán (NCC)</th>
                                    <th class="px-6 py-3 cursor-pointer" id="sort-date">Ngày Hóa Đơn <i
                                            class="fas fa-sort"></i></th>
                                    <th class="px-6 py-3 text-right">Tổng Tiền</th>
                                    <th class="px-6 py-3">Trạng Thái</th>
                                    <th class="px-6 py-3 text-center">Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody id="invoice-list-body" class="divide-y divide-gray-200">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination -->
                    <div id="invoice-pagination" class="flex justify-center items-center p-4 space-x-2 border-t"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Invoice Modal (Add/Edit) -->
    <div id="invoice-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-10 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <div class="flex justify-between items-center border-b pb-3 mb-4">
                    <h3 id="invoice-modal-title" class="text-xl leading-6 font-medium text-gray-900">Tạo Hóa Đơn Mới
                    </h3>
                    <button id="close-invoice-modal-btn" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times fa-lg"></i>
                    </button>
                </div>

                <form id="invoice-form" class="space-y-4">
                    <input type="hidden" id="invoice-id">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="invoice-number" class="block text-sm font-medium text-gray-700">Số Hóa Đơn
                                *</label>
                            <input type="text" id="invoice-number"
                                class="mt-1 w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                                required>
                        </div>
                        <div>
                            <label for="invoice-date" class="block text-sm font-medium text-gray-700">Ngày Hóa Đơn
                                *</label>
                            <input type="date" id="invoice-date"
                                class="mt-1 w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                                required>
                        </div>
                    </div>

                    <div class="relative">
                        <label for="invoice-seller" class="block text-sm font-medium text-gray-700">Người Bán (Nhà Cung
                            Cấp) *</label>
                        <div class="flex mt-1">
                            <div class="relative flex-grow">
                                <input type="text" id="invoice-seller" placeholder="Chọn hoặc nhập tên nhà cung cấp..."
                                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                                    autocomplete="off">
                                <div id="seller-autocomplete-list"
                                    class="absolute z-10 w-full bg-white border rounded-lg mt-1 max-h-40 overflow-y-auto hidden shadow-lg">
                                </div>
                            </div>
                            <button type="button" id="quick-add-seller-btn"
                                class="ml-2 bg-green-500 text-white px-3 py-2 rounded-lg hover:bg-green-600">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label for="invoice-total" class="block text-sm font-medium text-gray-700">Tổng Tiền *</label>
                        <input type="text" id="invoice-total" placeholder="0"
                            class="mt-1 w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 text-right font-semibold text-lg"
                            required>
                    </div>

                    <div>
                        <label for="invoice-status" class="block text-sm font-medium text-gray-700">Trạng Thái</label>
                        <select id="invoice-status"
                            class="mt-1 w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="unpaid">Chưa Thanh Toán</option>
                            <option value="paid">Đã Thanh Toán</option>
                            <option value="partial">Thanh Toán Một Phần</option>
                        </select>
                    </div>

                    <div>
                        <label for="invoice-note" class="block text-sm font-medium text-gray-700">Ghi Chú</label>
                        <textarea id="invoice-note" rows="3"
                            class="mt-1 w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                </form>

                <div class="mt-6 pt-4 border-t flex justify-end space-x-3">
                    <button type="button" id="cancel-invoice-btn"
                        class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg font-medium hover:bg-gray-400">Hủy</button>
                    <button type="button" id="save-invoice-btn"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">Lưu Hóa
                        Đơn</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Supplier Modal -->
    <div id="quick-supplier-modal"
        class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-[60]">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Thêm Nhanh Nhà Cung Cấp</h3>
                <form id="quick-supplier-form" class="mt-2 px-7 py-3 space-y-4 text-left">
                    <div>
                        <label for="quick-supplier-name" class="block text-sm font-medium text-gray-700">Tên Nhà Cung
                            Cấp:</label>
                        <input type="text" id="quick-supplier-name"
                            class="mt-1 w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    </div>
                </form>
                <div class="items-center px-4 py-3 flex justify-end space-x-3">
                    <button id="close-quick-supplier-modal-btn"
                        class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400">Hủy</button>
                    <button id="save-quick-supplier-btn"
                        class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script src="supabase-client.js"></script>
    <script src="invoices.js"></script>
</body>

</html>
